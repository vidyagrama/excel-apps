<script>
  let inventoryData = [];
  let ordersData = []; // To store current month's orders
  let selectedSku = '';

  window.onload = function() {
    // Login Enter Key Listener
    const loginInputs = document.querySelectorAll('#login-container input');
    loginInputs.forEach(input => {
      input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') login();
      });
    });

    // Modal Stock Enter Key Listener
    const stockInput = document.getElementById('new-stock-input');
    if (stockInput) {
      stockInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') saveStock();
      });
    }
  };

  /** --- LOGIN LOGIC --- **/
  function login() {
    const id = document.getElementById('userid').value;
    const mob = document.getElementById('mobile').value;
    const btn = document.getElementById('loginBtn');
    const msg = document.getElementById('login-msg');
    
    if(!id || !mob) { msg.innerText = "Please fill in all fields."; return; }

    btn.innerHTML = '<span class="loader"></span> Authenticating...';
    btn.disabled = true;

    google.script.run
      .withSuccessHandler(function(res) {
        if(res.success) {
          document.getElementById('login-container').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';
          document.getElementById('user-display').innerHTML = `<i class="material-icons">account_circle</i> Logged in: ${res.userName}`;
          loadInventory(); 
        } else {
          msg.innerText = res.message;
          btn.innerHTML = "Login to Admin";
          btn.disabled = false;
        }
      })
      .withFailureHandler(function(err) {
         msg.innerText = "System Error: " + err;
         btn.disabled = false;
      })
      .checkLogin(id, mob); 
  }

  function logout() { location.reload(); }

  /** --- TAB ROUTING --- **/

    function openTab(evt, tabName) {
    // 1. Update UI (Tabs)
    const tabs = document.getElementsByClassName("tab");
    for (let i = 0; i < tabs.length; i++) {
      tabs[i].classList.remove("active");
    }
    evt.currentTarget.classList.add("active");

    // 2. Clear the content area immediately so the user doesn't see old data
    const contentArea = document.getElementById('tab-content');
    contentArea.innerHTML = '<div style="text-align:center; padding:50px;"><span class="loader" style="border-color:var(--vg-amber); border-bottom-color:transparent;"></span><br>Loading ' + tabName + '...</div>';

    // 3. Route to the correct loader
    if (tabName === 'Inventory') {
      renderInventoryDashboard();
    } else if (tabName === 'Orders') {
      renderOrdersDashboard();
    }
    // Add other tabs here...
  }

  /** --- INVENTORY LOGIC --- **/
  function loadInventory() {
    const refreshBtn = document.getElementById('refreshInvBtn');
    if(refreshBtn) {
      refreshBtn.innerHTML = '<span class="loader"></span> Refreshing...';
      refreshBtn.classList.add('btn-refresh-active');
      refreshBtn.disabled = true;
    }

    google.script.run.withSuccessHandler(function(data) {
      inventoryData = data;
      renderInventoryDashboard();
    }).getInventoryData();
  }

  function saveStock() {
    const newValue = document.getElementById('new-stock-input').value;
    const saveBtn = document.getElementById('modal-save-btn');
    const cancelBtn = document.getElementById('modal-cancel-btn');
    const status = document.getElementById('modal-status');

    if (!saveBtn.disabled) { // Prevent double-clicks
      saveBtn.disabled = true;
      if (cancelBtn) cancelBtn.style.display = 'none';
      saveBtn.innerHTML = '<span class="loader"></span> Saving...';

      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.success) {
            saveBtn.innerHTML = '✓ Done';
            saveBtn.style.backgroundColor = '#2e7d32'; // Green
            status.className = "status-success";
            status.innerHTML = "✓ " + (res.message || "Stock Updated!");
            status.style.display = 'block';

            setTimeout(() => {
              closeModal();
              loadInventory(); 
            }, 1200);
          } else {
            saveBtn.disabled = false; 
            if (cancelBtn) cancelBtn.style.display = 'block';
            saveBtn.innerHTML = 'Save';
            status.className = "status-error";
            status.innerHTML = "✕ " + (res ? res.message : "Error: No response");
            status.style.display = 'block';
          }
        })
        .withFailureHandler(function(err) {
          saveBtn.disabled = false;
          if (cancelBtn) cancelBtn.style.display = 'block';
          saveBtn.innerHTML = 'Save';
          status.className = "status-error";
          status.innerHTML = "✕ System Error: " + err;
          status.style.display = 'block';
        })
        .updateStockValue(selectedSku, parseFloat(newValue));
    }
  }

  function renderInventoryDashboard() {
    const metrics = inventoryData.reduce((acc, item) => {
      const val = (item.stock * item.salePrice) || 0;
      acc.totalVal += val; acc.totalQty += (item.stock || 0);
      if (!acc.cats[item.mainCategory]) acc.cats[item.mainCategory] = { qty: 0, val: 0 };
      acc.cats[item.mainCategory].qty += (item.stock || 0);
      acc.cats[item.mainCategory].val += val;
      return acc;
    }, { totalVal: 0, totalQty: 0, cats: {} });

    let headerHtml = `<div class="summary-container">
      <div class="summary-card total">
        <div class="label">Total Stock Value</div>
        <div class="value">₹${metrics.totalVal.toLocaleString('en-IN')}</div>
        <div class="sub-label">${metrics.totalQty} Units Total</div>
      </div>`;
    for (let cat in metrics.cats) {
      headerHtml += `
        <div class="summary-card">
          <div class="label">${cat}</div>
          <div class="value">₹${metrics.cats[cat].val.toLocaleString('en-IN')}</div>
          <div class="sub-label">${metrics.cats[cat].qty} Units</div>
        </div>`;
    }
    headerHtml += `</div>`;

    let controlsHtml = `
      <div class="inventory-controls">
        <div class="search-group">
          <div class="search-box">
             <i class="material-icons" style="position:absolute; left:10px; top:12px; font-size:18px; color:#999;">search</i>
             <input type="text" id="invSearch" placeholder="Search Item Name or SKU..." onkeyup="filterInventory()">
          </div>
          <select id="catFilter" onchange="filterInventory()">
            <option value="All">All Categories</option>
            ${Object.keys(metrics.cats).map(c => `<option value="${c}">${c}</option>`).join('')}
          </select>
        </div>
        <button id="refreshInvBtn" class="btn-primary btn-refresh" onclick="loadInventory()">Refresh</button>
      </div>`;

    document.getElementById('tab-content').innerHTML = headerHtml + controlsHtml + `<div id="invTableWrapper">${generateTableHTML(inventoryData)}</div>`;
  }

  function filterInventory() {
    const query = document.getElementById('invSearch').value.toLowerCase();
    const cat = document.getElementById('catFilter').value;
    
    const filtered = inventoryData.filter(item => {
      const matchesSearch = item.itemName.toLowerCase().includes(query) || item.sku.toLowerCase().includes(query);
      const matchesCat = (cat === "All" || item.mainCategory === cat);
      return matchesSearch && matchesCat;
    });
    document.getElementById('invTableWrapper').innerHTML = generateTableHTML(filtered);
  }

  function generateTableHTML(data) {
    const sorted = [...data].sort((a, b) => (b.stock <= b.reorderPoint) - (a.stock <= a.reorderPoint));
    let rows = sorted.map(item => {
      const isLow = item.stock <= item.reorderPoint;
      const badge = item.stock <= 0 ? 'badge-out' : (isLow ? 'badge-low' : 'badge-ok');
      return `
        <tr style="${isLow ? 'background-color:#fff9f0;' : ''}">
          <td><strong>${item.itemName}</strong></td>
          <td><small>${item.sku}</small></td>
          <td>${item.mainCategory}</td>
          <td onclick="openUpdateModal('${item.sku}', '${item.itemName}', ${item.stock})" style="cursor:pointer; font-weight:bold; color:var(--vg-brown);">
            <div style="display:flex; align-items:center; gap:5px;">
              ${item.stock} ${item.uom} <i class="material-icons" style="font-size:14px; opacity:0.5;">edit</i>
            </div>
          </td>
          <td>₹${item.salePrice.toFixed(2)}</td>
          <td><span class="badge ${badge}">${item.stock<=0?'Out':(isLow?'Low':'OK')}</span></td>
        </tr>`;
    }).join('');

    return `<div class="admin-table-wrapper"><table class="admin-table">
      <thead><tr><th>Item Name</th><th>SKU</th><th>Category</th><th>Stock</th><th>Price</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }

  /** --- MODAL CONTROLS --- **/
  function openUpdateModal(sku, name, current) {
  selectedSku = sku.toString().trim();
  
  const saveBtn = document.getElementById('modal-save-btn');
  const cancelBtn = document.getElementById('modal-cancel-btn');
  const status = document.getElementById('modal-status');
  const input = document.getElementById('new-stock-input');

  // RESET BUTTON TO AMBER (ACTIVE STATE)
  if (saveBtn) {
    saveBtn.disabled = false;
    saveBtn.innerHTML = 'Save';
    saveBtn.style.backgroundColor = 'var(--vg-amber)'; // Force reset to Amber
    saveBtn.style.opacity = '1';
  }
  
  if (cancelBtn) {
    cancelBtn.disabled = false;
    cancelBtn.style.display = 'block';
  }

  if (status) status.style.display = 'none';
  
  document.getElementById('modal-item-name').innerText = name;
  input.value = current;
  document.getElementById('stock-modal').style.display = 'flex';
  
  setTimeout(() => {
    input.focus();
    input.select();
  }, 150);
}
  
  /** --- ORDERS & INVOICE LOGIC --- **/
  function renderOrdersDashboard() {
    const now = new Date();
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    
    // 1. Create the skeleton structure first
    document.getElementById('tab-content').innerHTML = `
      <div class="inventory-controls">
        <div class="search-group">
          <select id="orderMonth" onchange="loadOrders()">
            ${months.map((m, i) => `<option value="${i+1}" ${i === now.getMonth() ? 'selected' : ''}>${m}</option>`).join('')}
          </select>
          <select id="orderYear" onchange="loadOrders()">
            <option value="2024">2024</option>
            <option value="2025" selected>2025</option>
            <option value="2026">2026</option>
          </select>
        </div>
        <button class="btn-primary" onclick="loadOrders()">Refresh Orders</button>
      </div>
      <div id="orders-summary"></div>
      <div id="orders-table-container"></div>
    `;
    
    // 2. Now call the data
    loadOrders();
  }

  function loadOrders() {
    const container = document.getElementById('orders-table-container');
    container.innerHTML = '<div style="text-align:center; padding:20px;">Fetching...</div>';

    google.script.run
      .withSuccessHandler(function(data) {
        console.log("Data received from Server:");
        console.table(data); // This shows your sheet data in the F12 console!

        if (!data || data.length === 0) {
          container.innerHTML = '<div style="text-align:center; padding:20px;">Sheet returned 0 rows.</div>';
          return;
        }

        // 1. Store the data globally
        ordersData = data; 
        
        // 2. Build the table
        renderOrdersTable(data);
      })
      .withFailureHandler(function(err) {
        container.innerHTML = "Error: " + err;
      })
      .getOrdersData(); // Calling our new "Fetch All" version
  }

  function updateOrderSummary(data) {
    const stats = data.reduce((acc, o) => {
      acc.total += 1;
      acc.revenue += parseFloat(o.total_amount || 0);
      if(o.order_status === 'Delivered') acc.delivered += 1;
      return acc;
    }, { total: 0, revenue: 0, delivered: 0 });

    document.getElementById('orders-summary').innerHTML = `
      <div class="summary-container">
        <div class="summary-card total">
          <div class="label">Total Orders</div>
          <div class="value">${stats.total}</div>
          <div class="sub-label">This Month</div>
        </div>
        <div class="summary-card">
          <div class="label">Revenue</div>
          <div class="value">₹${stats.revenue.toLocaleString('en-IN')}</div>
        </div>
        <div class="summary-card">
          <div class="label">Delivered</div>
          <div class="value">${stats.delivered}</div>
          <div class="sub-label">Completion Rate</div>
        </div>
      </div>`;
  }

  function renderOrdersTable(data) {
    let rows = data.map(o => `
      <tr>
        <td onclick="viewOrderDetails('${o.order_id}')" style="cursor:pointer; color:var(--vg-brown); font-weight:bold;">#${o.order_id}</td>
        <td>${o.customer_name}</td>
        <td>${new Date(o.order_date).toLocaleDateString()}</td>
        <td>₹${o.total_amount}</td>
        <td>
          <select onchange="updateStatus('${o.order_id}', 'status', this.value)">
            <option value="Received" ${o.order_status=='Received'?'selected':''}>Received</option>
            <option value="Accepted" ${o.order_status=='Accepted'?'selected':''}>Accepted</option>
            <option value="Delivered" ${o.order_status=='Delivered'?'selected':''}>Delivered</option>
          </select>
        </td>
        <td>
          <select onchange="updateStatus('${o.order_id}', 'payment', this.value)">
            <option value="Unpaid" ${o.payment_status=='Unpaid'?'selected':''}>Unpaid</option>
            <option value="Paid" ${o.payment_status=='Paid'?'selected':''}>Paid</option>
          </select>
        </td>
        <td>
          <button class="icon-btn" onclick="generateInvoicePDF('${o.order_id}')"><i class="material-icons">print</i></button>
          <button class="icon-btn" onclick="deleteOrder('${o.order_id}')"><i class="material-icons" style="color:red">delete</i></button>
        </td>
      </tr>
    `).join('');

    document.getElementById('orders-table-container').innerHTML = `
      <div class="admin-table-wrapper">
        <table class="admin-table">
          <thead><tr><th>ID</th><th>Customer</th><th>Date</th><th>Total</th><th>Status</th><th>Payment</th><th>Actions</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function updateStatus(id, type, val) {
    google.script.run.withSuccessHandler(() => loadOrders()).updateOrderField(id, type, val);
  }

  function deleteOrder(id) {
    if(confirm("Permanently delete Order #" + id + "?")) {
      google.script.run.withSuccessHandler(() => loadOrders()).deleteOrderData(id);
    }
  }

  function viewOrderDetails(orderId) {
    google.script.run.withSuccessHandler(function(data) {
      const { summary, items } = data;
      let itemsTable = `<table class="admin-table"><thead><tr><th>Product</th><th>Qty</th><th>Price</th></tr></thead><tbody>`;
      items.forEach(it => {
        itemsTable += `<tr><td>${it.itemName}</td><td>${it.quantity} ${it.uom || ''}</td><td>₹${it.unit_price}</td></tr>`;
      });
      itemsTable += `</tbody></table><br>
      <button class="btn-primary" onclick="generateInvoicePDF('${orderId}')">Print Invoice</button>`;
      
      document.getElementById('modal-item-name').innerText = "Order Details: #" + orderId;
      document.getElementById('modal-status').innerHTML = itemsTable;
      document.getElementById('modal-status').style.display = 'block';
      document.getElementById('stock-modal').style.display = 'flex';
      // Hide standard input fields for this view
      document.getElementById('new-stock-input').style.display = 'none';
      document.getElementById('modal-save-btn').style.display = 'none';
    }).getOrderInvoiceData(orderId);
  }

  /** --- PDF INVOICE GENERATOR --- **/
  function generateInvoicePDF(orderId) {
    google.script.run.withSuccessHandler(function(data) {
      const { summary, items } = data;
      const printWin = window.open('', '_blank');
      let tableRows = items.map(it => `<tr><td>${it.itemName}</td><td>${it.quantity}</td><td>₹${it.unit_price}</td><td>₹${(it.quantity * it.unit_price).toFixed(2)}</td></tr>`).join('');
      
      const html = `<html><body style="font-family:sans-serif; padding:20px;">
        <h2>INVOICE #${summary.order_id}</h2>
        <p>Customer: ${summary.customer_name}<br>Date: ${new Date(summary.order_date).toLocaleDateString()}</p>
        <table border="1" width="100%" style="border-collapse:collapse;">
          <tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr>${tableRows}
          <tr><th colspan="3" align="right">Final Amount:</th><td>₹${summary.total_amount}</td></tr>
        </table>
        <script>window.print();<\/script>
      </body></html>`;
      printWin.document.write(html);
      printWin.document.close();
    }).getOrderInvoiceData(orderId);
  }

  function closeModal() { document.getElementById('stock-modal').style.display = 'none'; }

</script>
