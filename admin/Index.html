<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <?!= include('Styles'); ?>
</head>

<body>
  <div id="login-container">
    <div class="logo-text">VIDYAGRAMA</div>
    <div class="logo-sub">Organic & Desi Supplies</div>
    <div id="login-fields">
      <input type="text" id="userid" placeholder="Admin ID">
      <input type="password" id="mobile" placeholder="Mobile Number">
      <button class="btn-primary" id="loginBtn" onclick="login()">Login to Admin</button>
    </div>
    <p id="login-msg" style="color: #d32f2f; font-size: 13px; margin-top: 15px;"></p>
  </div>

  <div id="dashboard" style="display: none;">
    <header>
      <div><span style="color: var(--vg-amber)">●</span> <strong>Admin Portal</strong></div>
      <div id="user-display"></div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <div class="nav-tabs">
      <div class="tab active" onclick="openTab(event, 'Inventory')">Inventory</div>
      <div class="tab" onclick="openTab(event, 'Orders')">Orders & Invoices</div>
      <div class="tab" onclick="openTab(event, 'Purchase')">Purchase Orders</div>
      <div class="tab" onclick="openTab(event, 'Balance')">Balance Sheet</div>
      <div class="tab" onclick="openTab(event, 'Reports')">Reports</div>
      <div class="tab" onclick="openTab(event, 'Settings')">Backup & Restore</div>
    </div>

    <div class="content-area">
      <div id="tab-content" class="card"></div>
    </div>
  </div>

  <?!= include('Scripts'); ?>
</body>

</html>
