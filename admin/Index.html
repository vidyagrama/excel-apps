<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <?!= include('Styles'); ?>
</head>

<body>
  <div id="login-container">
    <div class="logo-text">VIDYAGRAMA</div>
    <div class="logo-sub">Organic & Desi Supplies</div>
    <div id="login-fields">
      <input type="text" id="userid" placeholder="Admin ID">
      <input type="password" id="mobile" placeholder="Mobile Number">
      <button class="btn-primary" id="loginBtn" onclick="login()">Login to Admin</button>
    </div>
    <p id="login-msg" style="color: #d32f2f; font-size: 13px; margin-top: 15px;"></p>
  </div>

  <div id="dashboard" style="display: none;">
    <header>
      <div><span style="color: var(--vg-amber)">●</span> <strong>Admin Portal</strong></div>
      <div id="user-display"></div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <div class="nav-tabs">
      <div class="tab active" onclick="openTab(event, 'Inventory')">Inventory</div>
      <div class="tab" onclick="openTab(event, 'Orders')">Orders & Invoices</div>
      <div class="tab" onclick="openTab(event, 'Purchase')">Purchase Orders</div>
      <div class="tab" onclick="openTab(event, 'Balance')">Balance Sheet</div>
      <div class="tab" onclick="openTab(event, 'Reports')">Reports</div>
      <div class="tab" onclick="openTab(event, 'Settings')">Backup & Restore</div>
    </div>

    <div class="content-area">
      <div id="tab-content" class="card"></div>
    </div>
  </div>

  <div id="stock-modal" class="modal-overlay">
    <div class="modal-content" style="max-width: 600px; width: 90%;"> <h3 id="modal-item-name" style="margin-top:0; color:var(--vg-brown);">Update Stock</h3>
      <p id="modal-subtitle" style="font-size: 12px; color: #666; margin-bottom:15px;">Enter new quantity below</p>

      <div id="modal-status" style="min-height: 20px; overflow-x: auto;"></div>

      <input type="number" id="new-stock-input"
            style="text-align: center; font-size: 24px; font-weight: bold; width: 80%; padding: 10px; margin-bottom: 20px; border: 2px solid var(--vg-amber);">

      <div style="display: flex; gap: 10px; justify-content: center;">
        <button id="modal-cancel-btn" class="btn-cancel" onclick="closeModal()"
                style="background:#eee; color:#333; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; flex:1;">
          Close
        </button>
        <button id="modal-save-btn" class="btn-save" onclick="saveStock()"
                style="background:var(--vg-amber); color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:bold; flex:1;">
          Save
        </button>
      </div>
    </div>
  </div>

  <?!= include('Scripts'); ?>
</body>

</html>
