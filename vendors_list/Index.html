<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --primary-purple: #673ab7;
      --hover-purple: #512da8;
      --bg-purple: #f3e5f5;
    }

    body, input, textarea, button, select { font-family: Verdana, Geneva, sans-serif; }
    body { padding: 20px; background-color: var(--bg-purple); display: flex; justify-content: center; }

    .container {
      width: 100%;
      max-width: 650px;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(103, 58, 183, 0.15);
    }

    h2 { text-align: center; color: var(--primary-purple); margin-top: 0; border-bottom: 2px solid var(--bg-purple); padding-bottom: 10px; }

    #status-bar {
      display: none; padding: 10px; margin-bottom: 15px; border-radius: 8px;
      text-align: center; font-size: 13px; font-weight: bold;
    }

    .search-box {
      margin-bottom: 25px; padding: 15px; background: #ede7f6;
      border-radius: 8px; display: flex; gap: 10px;
    }

    .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .field { margin-bottom: 15px; }
    .full-width { grid-column: span 2; }
    label { display: block; margin-bottom: 6px; font-weight: bold; color: #4a148c; font-size: 13px; }

    input, select, textarea {
      width: 100%; padding: 10px; border: 2px solid #e1bee7;
      border-radius: 8px; box-sizing: border-box; font-size: 14px;
    }

    input:focus, select:focus { border-color: var(--primary-purple); outline: none; }

    button {
      width: 100%; padding: 14px; background-color: var(--primary-purple);
      color: white; border: none; border-radius: 8px; font-size: 16px;
      font-weight: bold; cursor: pointer; transition: 0.3s;
    }

    button:hover { background-color: var(--hover-purple); }
    .secondary-btn { background-color: #9575cd; padding: 10px 20px; width: auto; }
    .reset-btn { background-color: #757575; padding: 10px 20px; width: auto; }

    #success-msg { display: none; text-align: center; padding: 40px 10px; }
    .check-icon { font-size: 60px; color: #4caf50; }

    /*This is for list of vendors*/
    /* Fix for the blank screen and alignment */
    /* Sidebar Layout */
.main-wrapper {
  display: flex;
  gap: 20px;
  width: 100%;
  max-width: 1100px; /* Increased width to accommodate both */
}

.sidebar {
  flex: 1;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  max-height: 800px;
  overflow-y: auto;
}

#form-container { flex: 1.5; } /* Makes form wider than list */

.vendor-item {
  padding: 12px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
  transition: 0.2s;
}

.vendor-item:hover { background-color: #f3e5f5; }

.vendor-item strong { color: var(--primary-purple); font-size: 14px; }
.vendor-item p { margin: 4px 0 0; font-size: 12px; color: #666; }

.list-header {
  font-weight: bold;
  color: #4a148c;
  margin-bottom: 15px;
  padding-bottom: 5px;
  border-bottom: 2px solid var(--bg-purple);
}/* Sidebar Layout */
.main-wrapper {
  display: flex;
  gap: 20px;
  width: 100%;
  max-width: 1100px; /* Increased width to accommodate both */
}

.sidebar {
  flex: 1;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  max-height: 800px;
  overflow-y: auto;
}

  padding: 12px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
  transition: 0.2s;
}

.vendor-item:hover { background-color: #f3e5f5; }

.vendor-item strong { color: var(--primary-purple); font-size: 14px; }
.vendor-item p { margin: 4px 0 0; font-size: 12px; color: #666; }

.list-header {
  font-weight: bold;
  color: #4a148c;
  margin-bottom: 15px;
  padding-bottom: 5px;
  border-bottom: 2px solid var(--bg-purple);
}

  </style>
</head>

<body>
  <div class="main-wrapper">
    <div class="sidebar">
      <div class="list-header">Onboarded Vendors</div>
      <div id="vendorList">Loading...</div>
    </div>

    <div class="container">
      <div id="form-container">
        <h2>Vidyagrama Vendor Manager</h2>

        <div id="status-bar"></div>

        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search Vendor ID..." onkeypress="handleSearchKeyPress(event)">
          <button type="button" class="secondary-btn" onclick="findVendor()">Search</button>
          <button type="button" class="reset-btn" onclick="clearFormToDefault(true)">Reset</button>
        </div>

        <form id="entryForm">
          <input type="hidden" id="rowNumber" name="rowNumber">

          <div class="grid-container">
            
            <div class="field full-width">
              <label>Vendor ID (Manual String)</label>
              <input type="text" id="vendorIdInput" name="vendorId" placeholder="e.g. (3 digit) SSP - Sahaja Samrudha Organics " required>
            </div>

            <div class="field full-width">
              <label>Business Name</label>
              <input type="text" name="businessName" required>
            </div>

            <div class="field">
              <label>Identity</label>
              <select name="identity" id="identityDropdown">
                <option value="">Loading identities...</option>
              </select>
            </div>

            <div class="field">
              <label>Main Category</label>
              <select name="mainCategory" id="mainCategory" onchange="updateSubCategories()">
                <option value="">Loading...</option>
              </select>
            </div>

          <div class="field">
              <label>Sub Category</label>
              <select name="subCategory" id="subCategory">
                <option value="">Select Main Category First</option>
              </select>
            </div>

            <div class="field">
              <label>Vendor Status</label>
              <select name="status">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
                <option value="Pending">Pending</option>
              </select>
            </div>

            <div class="field">
              <label>Contact Person</label>
              <input type="text" name="contactPerson" required>
            </div>

            <div class="field">
              <label>Phone Number</label>
              <input type="text" name="phone" id="phoneInput" placeholder="+91..." required>
            </div>

            <div class="field">
              <label>Email Address</label>
              <input type="email" name="email">
            </div>

            <div class="field full-width">
              <label>Address</label>
              <input type="text" name="address">
            </div>

            <div class="field">
              <label>GST/VAT/TAX</label>
              <input type="text" name="taxId">
            </div>

            <div class="field">
              <label>MOQ(Minimum Order Quantity)</label>
              <input type="text" name="moq">
            </div>

            <div class="field">
              <label>Lead Time</label>
              <input type="text" name="leadTime">
            </div>

            <div class="field">
              <label>Bank Details</label>
              <textarea name="bankDetails" rows="1"></textarea>
            </div>
          </div>

          <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button type="submit" id="submitBtn" style="flex: 3;">Save Vendor</button>
            <button type="button" id="deleteBtn" onclick="deleteEntry()" style="background-color: #e57373; flex: 1; display: none;">Delete</button>
          </div>
        </form>
      </div>

      <div id="success-msg">
        <div class="check-icon">✓</div>
        <h2 id="msg-title">Success!</h2>
        <p id="msg-body"></p>
        <button onclick="resetToForm()" style="margin-top:20px;">Return to Form</button>
      </div>

      <div id="deleteModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:12px; max-width:400px; width:90%; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
          <div style="font-size: 50px; color: #e57373; margin-bottom: 10px;">⚠️</div>
          <h3 style="color:#4a148c; margin-top:0;">Confirm Deletion</h3>
          <p style="color:#666; font-size:14px;">Are you sure you want to delete this vendor? This action cannot be undone.</p>
          <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeDeleteModal()" style="background:#eee; color:#333; flex:1;">Cancel</button>
            <button onclick="executeDelete()" style="background:#dc3545; color:white; flex:1;">Delete Now</button>
          </div>
        </div>
      </div>

      
    </div>

  </div>

  <script>
    // AUTO-CAPITALIZE ID inputs for better data quality
    const idInputs = ['vendorIdInput', 'searchInput'];
    idInputs.forEach(id => {
      document.getElementById(id).addEventListener('input', function(e) {
        e.target.value = e.target.value.toUpperCase();
      });
    });

    // Phone prefix logic
    document.getElementById('phoneInput').addEventListener('input', function (e) {
      let val = e.target.value;
      if (!val.startsWith('+91')) val = '+91' + val.replace(/\D/g, '');
      e.target.value = val.slice(0, 13);
    });

    function showStatus(msg, color) {
      const statusBar = document.getElementById('status-bar');
      statusBar.innerHTML = msg;
      statusBar.style.backgroundColor = color + "22"; 
      statusBar.style.color = color;
      statusBar.style.border = "1px solid " + color;
      statusBar.style.display = 'block';
      setTimeout(() => { statusBar.style.display = 'none'; }, 5000);
    }
  
    function findVendor() {
      const term = document.getElementById('searchInput').value;
      if (!term) return showStatus("Enter ID to search", "#dc3545");

      const btn = document.querySelector('.secondary-btn');
      btn.innerHTML = "Searching...";

      google.script.run.withSuccessHandler(res => {
        btn.innerHTML = "Search";
        const f = document.getElementById('entryForm');

        if (res) {
          const d = res.data;
          document.getElementById('rowNumber').value = res.row;

          // 1. Map simple fields
          f.vendorId.value = d[0];      // Col 1
          f.businessName.value = d[1];  // Col 2
          f.identity.value = d[2];      // Col 3
          f.mainCategory.value = d[3];  // Col 4

          // 2. CRITICAL: Repopulate Sub Category dropdown based on loaded Main Category
          // This function was defined in our previous step to fill the second box
          updateSubCategories(); 

          // 3. Now set the Sub Category value (now that the options exist)
          f.subCategory.value = d[4];   // Col 5

          // 4. Map remaining fields (Indices shifted by +1 from your old code)
          f.status.value = d[5];        // Col 6
          f.contactPerson.value = d[6]; // Col 7
          f.phone.value = d[7].toString().replace(/'/g, ""); // Col 8
          f.email.value = d[8];         // Col 9
          f.address.value = d[9];       // Col 10
          f.taxId.value = d[10];        // Col 11
          f.moq.value = d[11];          // Col 12
          f.leadTime.value = d[12];     // Col 13
          f.bankDetails.value = d[13];  // Col 14

          document.getElementById('submitBtn').innerHTML = "Update Vendor " + d[0];
          document.getElementById('deleteBtn').style.display = "block";
          showStatus("Vendor " + d[0] + " loaded successfully.", "#28a745");
          
        } else {
          showStatus("Vendor ID not found.", "#dc3545");
          clearFormToDefault(false); 
          f.vendorId.value = term; 
          document.getElementById('rowNumber').value = ""; 
          document.getElementById('submitBtn').innerHTML = "Onboard New Vendor: " + term;
          document.getElementById('deleteBtn').style.display = "none";
        }
      })
      .withFailureHandler(err => {
        btn.innerHTML = "Search";
        showStatus("Error: " + err, "#dc3545");
      })
      .searchVendor(term);
    }

    function deleteEntry() {
      const row = document.getElementById('rowNumber').value;
      if (confirm("Delete this vendor record?")) {
        google.script.run.withSuccessHandler(msg => {
          alert(msg);
          resetToForm();
        }).deleteVendorByRow(row);
      }
    }

    document.getElementById('entryForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = "Processing...";

      google.script.run
        .withSuccessHandler(response => {
          document.getElementById('msg-body').innerHTML = response;
          document.getElementById('form-container').style.display = 'none';
          document.getElementById('success-msg').style.display = 'block';

          // REFRESH SIDEBAR HERE
          refreshVendorList();

          btn.disabled = false;
        })
        .processForm(this);
    });

    function clearFormToDefault(clearSearch = false) {
      document.getElementById('entryForm').reset();
      document.getElementById('rowNumber').value = "";
      document.getElementById('deleteBtn').style.display = "none";
      document.getElementById('submitBtn').innerHTML = "Save Vendor";
      if (clearSearch) document.getElementById('searchInput').value = "";
    }

    function resetToForm() {
      clearFormToDefault(true);
      document.getElementById('success-msg').style.display = 'none';
      document.getElementById('form-container').style.display = 'block';
    }

    function handleSearchKeyPress(event) {
      if (event.keyCode === 13) { event.preventDefault(); findVendor(); }
    }
    
    // Global variable to store the map locally
    let globalCategoryMap = {};

    // Run this function when the page finishes loading
    window.onload = function() {
      loadIdentities();
      loadCategories();
      refreshVendorList(); // Load the sidebar
    };

    function loadIdentities() {
      google.script.run
        .withSuccessHandler(function(list) {
          var dropdown = document.getElementById('identityDropdown');
          dropdown.innerHTML = ""; // Clear the "Loading..." message
          
          // Add a default blank option
          var defaultOpt = document.createElement("option");
          defaultOpt.text = "Select Identity";
          defaultOpt.value = "";
          dropdown.add(defaultOpt);

          // Add options from the Admin sheet
          list.forEach(function(item) {
            var opt = document.createElement("option");
            opt.value = item;
            opt.text = item;
            dropdown.add(opt);
          });
        })
        .getVendorIdentities();
    }

    function loadCategories(){
      // Load Category Map
      google.script.run
        .withSuccessHandler(function(map) {
          globalCategoryMap = map;
          const mainDropdown = document.getElementById('mainCategory');
          mainDropdown.innerHTML = '<option value="">Select Main Category</option>';
          
          // Fill Main Category dropdown
          Object.keys(map).forEach(cat => {
            let opt = document.createElement('option');
            opt.value = cat;
            opt.text = cat;
            mainDropdown.add(opt);
          });
        })
        .getCategoryMap();
    }

    function updateSubCategories() {
      const mainVal = document.getElementById('mainCategory').value;
      const subDropdown = document.getElementById('subCategory');
      
      // Clear existing options
      subDropdown.innerHTML = '<option value="">Select Sub Category</option>';
      
      if (mainVal && globalCategoryMap[mainVal]) {
        globalCategoryMap[mainVal].forEach(sub => {
          let opt = document.createElement('option');
          opt.value = sub;
          opt.text = sub;
          subDropdown.add(opt);
        });
      }
    }

    // Delete functions
    // 1. Open the custom modal
    function deleteEntry() {
      const row = document.getElementById('rowNumber').value;
      if (!row) return showStatus("No item selected to delete", "#dc3545");
      document.getElementById('deleteModal').style.display = 'flex';
    }

    // 2. Close the modal
    function closeDeleteModal() {
      document.getElementById('deleteModal').style.display = 'none';
    }

    // 3. Actually run the Google Script
    function executeDelete() {
      const row = document.getElementById('rowNumber').value;
      const btn = document.getElementById('deleteBtn');
      
      closeDeleteModal();
      btn.disabled = true;
      btn.innerHTML = "Deleting...";

      google.script.run
        .withSuccessHandler(msg => {
          btn.disabled = false;
          btn.innerHTML = "Delete";
          // Use your existing success screen logic
          document.getElementById('msg-body').innerHTML = msg;
          document.getElementById('form-container').style.display = 'none';
          document.getElementById('success-msg').style.display = 'block';
        })
        .withFailureHandler(err => {
          btn.disabled = false;
          btn.innerHTML = "Delete";
          showStatus("Delete Failed: " + err, "#dc3545");
        })
        .deleteVendorByRow(row);
    }

    /* Refresh Vendors list*/
    function refreshVendorList() {
      google.script.run.withSuccessHandler(function(vendors) {
        const listDiv = document.getElementById('vendorList');
        listDiv.innerHTML = ""; // Clear loader
        
        vendors.forEach(v => {
          const item = document.createElement('div');
          item.className = 'vendor-item';
          // Clicking an item triggers a search automatically
          item.onclick = () => {
            document.getElementById('searchInput').value = v.id;
            findVendor();
          };
          
          item.innerHTML = `
            <strong>${v.id}</strong>
            <p>${v.name}</p>
            <p style="font-style: italic; color: #9575cd;">${v.category}</p>
          `;
          listDiv.appendChild(item);
        });
      }).getOnboardedVendors();
    }

  </script>
</body>
</html>
