<script>
  let html5QrCode;
    let fullInventoryData = [];
    let subCategoryMap = {};

    // This audio is for Scanning Barcode recognized
    let audioCtx;
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    // This beep sound is after barcode scanned
    function playBeep() {
      initAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
      gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
      oscillator.start(); 
      oscillator.stop(audioCtx.currentTime + 0.1);
    }

    // Handle inventor data deletion
    function handleInventoryDelete() {
      const itemName = document.getElementsByName('itemName')[0].value || "this item";
      const sheet = document.getElementById('mainCategory').value;
      
      document.getElementById('modalTitle').innerText = "Delete Product?";
      document.getElementById('modalBody').innerHTML = `Are you sure you want to PERMANENTLY delete <b>${itemName}</b> from <b>${sheet}</b>? This cannot be undone.`;
      document.getElementById('modalIcon').innerText = "⚠️";
      document.getElementById('modalActionType').value = "INVENTORY";
      
      const confirmBtn = document.getElementById('modalConfirmBtn');
      confirmBtn.innerText = "Delete Forever";
      confirmBtn.style.background = "var(--danger-red)"; // Danger color
      
      document.getElementById('customModal').style.display = 'flex';
    }
    
    // Update sub categories based on main categories and also the SKU for next new item
    // Loading UOM based on categories from admin sheet directly, removed hardcoded values
    function updateSubCategories(selectedSub, selectedUom) {
      const main = document.getElementById('mainCategory').value;
      const subSelect = document.getElementById('subCategory');
      const skuField = document.getElementById('skuField');
      const uomSelect = document.getElementsByName('uom')[0];

      // 1. Reset Selects
      subSelect.innerHTML = '<option value="" disabled selected>Select Subcategory</option>';
      uomSelect.innerHTML = '<option value="" disabled selected>Select Unit</option>'; 

      const currentMap = window.subCategoryMap || {}; 
      const catData = currentMap[main];

      if (catData) {
        // 2. Populate Sub-Categories
        catData.subs.forEach(opt => {
          subSelect.add(new Option(opt, opt));
        });

        // 3. Populate UOMs (Loop through the array)
        if (catData.uoms && catData.uoms.length > 0) {
          catData.uoms.forEach(unit => {
            let opt = new Option(unit, unit);
            uomSelect.add(opt);
          });

          // Logic: Prioritize existing record's UOM, otherwise pick the first available one
          if (selectedUom) {
            uomSelect.value = selectedUom;
          } else if (catData.uoms.length === 1) {
            // If there's only one option (e.g., just 'kg'), select it automatically
            uomSelect.selectedIndex = 1; 
          }
        } else {
          uomSelect.add(new Option("No's", "No's"));
        }

        // 4. Mode Detection (Update vs New)
        if (selectedSub) {
          subSelect.value = selectedSub;
          console.log("Update Mode: Preserving existing SKU.");
        } else {
          console.log("New Item Mode: Generating fresh SKU.");
          skuField.value = "Generating..."; 
          google.script.run
            .withSuccessHandler(nextSku => {
              skuField.value = nextSku;
              checkExistingImage(nextSku);

              // 2. NEW: Check for Google Drive Barcode
              google.script.run
                .withSuccessHandler(exists => {
                  updateBarcodeStatus(exists);
                })
                .checkBarcodeExists(nextSku);

            })
            .getNextSku(main);
        }
      } else {
        let loadingEl = document.createElement("option");
        loadingEl.textContent = "Select a Main Category first...";
        subSelect.appendChild(loadingEl);
      }
    }

    //Renders table data , inventory items list
    function renderTable(data) {
      const tbody = document.getElementById('recentItemsBody');
      tbody.innerHTML = '';

      // Get session and normalize the role to lowercase for comparison
      const session = JSON.parse(localStorage.getItem('vidyagrama_session') || '{}');
      const userRole = (session.role || "").toLowerCase();

      // Check if the role is the admin role
      const isAdmin = (userRole === 'inventory_admin');

      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No items found</td></tr>';
        return;
      }

      data.forEach(item => {
        const row = tbody.insertRow();
        const isLow = item.stock <= item.reorder;
        if (isLow) row.classList.add('low-stock-row');

        row.onclick = () => {
          /*if (item.sheetOrigin) {
            document.getElementById('mainCategory').value = item.sheetOrigin;
            updateSubCategories("");
          }*/
          document.getElementById('searchInput').value = item.sku || item.slNo;
          findItem();
        };

        // --- Logic for Image Tick Mark ---
        // Check if image_url exists and is not an empty string
        const hasImage = item.image_url && item.image_url.trim() !== "";
        const imageStatus = hasImage ? '<span style="color:var(--success-green); font-weight:bold;">✔</span>' : '<span style="color:#ccc;">-</span>';

        // Formatting Date
        let dateTimeDisplay = "--";
        if (item.updated) {
          const d = new Date(item.updated);
          if (!isNaN(d)) {
            const datePart = d.toLocaleDateString([], { day: '2-digit', month: '2-digit' });
            const timePart = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            dateTimeDisplay = `${datePart}, ${timePart}`;
          }
        }

        row.innerHTML = `
          <td style="color:var(--vg-brown); font-weight:bold;">${item.slNo || item.id}</td>
          <td>${item.name}${isLow ? '<span class="warning-icon"> ⚠️</span>' : ''}</td>
          <td style="text-align:center;">${imageStatus}</td> <td>${item.sku || '-'}</td>
          <td style="font-weight:bold; color:${isLow ? 'var(--danger-red)' : 'inherit'}">${item.stock}</td>
          <td style="color:#666; font-size:9px; white-space: nowrap;">${dateTimeDisplay}</td>
        `;
      });
    }

    // Spinning refresh button feature added
    function loadRecentItems() {
      //const sheetName = document.getElementById('mainCategory').value;

      const icon = document.getElementById('refreshIcon');
      const btn = document.getElementById('refreshBtn');
      const catEl = document.getElementById('mainCategory');
      
      if (!catEl) {
        console.error("Crash: Cannot find 'mainCategory' element");
        return;
      }

      const sheetName = catEl.value;
      console.log("Step 2: Sheet to fetch:", sheetName);

      if (icon) icon.classList.add('spinning');
      if (btn) btn.disabled = true;

      google.script.run
        .withSuccessHandler((items) => {
          console.log("Step 3: Server returned data", items);
          
          // Safety check for the global variable
          fullInventoryData = items || [];
          
          try {
            renderTable(fullInventoryData);

            // --- THE FIX ---
            // After deleting/refreshing, we want the form to be ready for a NEW item.
            // Calling this with "" triggers the "New Item Mode" logic inside updateSubCategories.
            const currentMain = document.getElementById('mainCategory').value;
            if (currentMain) {
              console.log("Refreshing SKU logic for category:", currentMain);
              updateSubCategories(""); 
            }

            console.log("Step 4: Table rendered");
          } catch (e) {
            console.error("Crash inside renderTable:", e);
          }
          
          if (icon) icon.classList.remove('spinning');
          if (btn) btn.disabled = false;
        })
        .withFailureHandler((err) => {
          console.error("Step 3 (Failed): Server error:", err);
          if (icon) icon.classList.remove('spinning');
          if (btn) btn.disabled = false;
          showStatus("Refresh failed: " + err, "var(--danger-red)");
        })
        .getRecentItems(sheetName);

    }

    // filter function for the sidebar list, introduced filter timeout
    let filterTimeout;
    function filterSidebarList() {
      clearTimeout(filterTimeout);
      filterTimeout = setTimeout(() => {
        const val = document.getElementById('listFilter').value.toLowerCase();
        const filtered = fullInventoryData.filter(i => 
          i.name.toLowerCase().includes(val) || 
          (i.sku && i.sku.toLowerCase().includes(val))
        );
        renderTable(filtered);
      }, 200); // 200ms delay
    }

    //Camera Bar code scanning function
    let isScanning = false;
    async function startScanner() {

      if (isScanning) return; // Prevent double trigger
        isScanning = true;

      // 1. Initialize audio context on user gesture to prevent block
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();

      document.getElementById('scanner-wrapper').style.display = 'block';
      
      // Ensure any old instance is cleaned up before starting a new one
      if (html5QrCode) {
        try { await html5QrCode.clear(); } catch(e) {}
      }

      html5QrCode = new Html5Qrcode("reader");

      const qrConfig = { 
        fps: 30, // Increased FPS for faster recognition
        // Rectangular box to match the 220x80 barcode proportion
        qrbox: { width: 300, height: 120 }, 
        aspectRatio: 1.777778, // 16:9 aspect ratio is better for modern phone screens
        formatsToSupport: [ 
          Html5QrcodeSupportedFormats.CODE_128 // Prioritize your generated format
        ],
        experimentalFeatures: {
          useBarCodeDetectorIfSupported: true // Uses native hardware acceleration if available
        }
      };

      html5QrCode.start(
        { facingMode: "environment" },  
        qrConfig, 
        (txt) => {
          if (txt.length > 2) { 
            playBeep(); 
            document.getElementById('searchInput').value = txt;
            stopScanner(); 
            findItem();
            isScanning = false; // Reset
          }
        }
      ).catch(err => {
        isScanning = false; // Reset
        console.error("Camera Error:", err);
        alert("Camera could not start. Please check permissions.");
        document.getElementById('scanner-wrapper').style.display = 'none';
      });
    }

    //STOP Camera Bar code scanner function
    function stopScanner() {
      if (html5QrCode) {
        html5QrCode.stop().then(() => {
          html5QrCode.clear(); // Complete cleanup
          document.getElementById('scanner-wrapper').style.display = 'none';
        }).catch(err => console.error("Stop Error:", err));
      }
    }

    // Find item based on search criteria
    function findItem() {
        const term = document.getElementById('searchInput').value;
        if (!term) return;
        const searchBtn = document.getElementById('mainSearchBtn');
        searchBtn.innerHTML = "Searching...";
        searchBtn.disabled = true;

        google.script.run.withSuccessHandler(res => {
            searchBtn.innerHTML = "Search";
            searchBtn.disabled = false;
            
            if (res) {
                const d = res.data; 
                const f = document.getElementById('entryForm');

                const session = JSON.parse(localStorage.getItem('vidyagrama_session') || '{}');
                const userRole = (session.role || "").toLowerCase();

                // Check if the role is the admin role
                const isAdmin = (userRole === 'inventory_admin');
                
                // Extract meaningful data for the message
                const itemName = d[2];
                const currentStock = d[4];
                const reorderPoint = d[9];
                const category = res.sheetName;

                // Fill the form fields
                document.getElementById('rowNumber').value = res.row;
                document.getElementById('slNo').value = d[0];
                f.mainCategory.value = category;
                updateSubCategories(d[1]);
                
                f.itemName.value = itemName; 
                f.uom.value = d[3];
                f.stock.value = currentStock;

                 // 2. Financial Security Logic
                const finFields = ['pPrice', 'markup', 'sPrice', 'valOutput'];

                if (isAdmin) {
                  f.purchasePrice.value = d[5]; 
                  f.priceMarkupPercentage.value = d[6];
                  f.salePrice.value = d[7]; 
                  f.stockValue.value = d[8];

                  // --- ADD THIS FOR ADMIN ---
                  finFields.forEach(id => {
                      const el = document.getElementById(id);
                      if (el) {
                          el.disabled = false;           // Enable for Admin
                          el.style.backgroundColor = "white";
                          el.style.cursor = "text";
                      }
                  }); 
                  
                } else {
                  // Mask data for Editor
                  f.purchasePrice.value = "0.00"; 
                  f.priceMarkupPercentage.value = "0";
                  f.salePrice.value = "0.00"; 
                  f.stockValue.value = "0.00";

                  // --- ADD THIS FOR EDITOR ---
                  finFields.forEach(id => {
                      const el = document.getElementById(id);
                      if (el) {
                          el.disabled = true;                // Disable for Editor
                          el.style.backgroundColor = "#f0f0f0"; // Gray background
                          el.style.cursor = "not-allowed";
                      }
                  });
                  
                }
                f.moq.value = d[10]; 
                f.vendorID.value = d[11]; 
                f.status.value = d[12];
                f.mfgDate.value = d[13]; 
                f.expiryDate.value = d[14]; 
                f.sku.value = d[15];
                
               // --- Updated Image Loading Logic ---
                const dbImageUrl = d[16] || "";
                const dbFileId = d[17] || "";
                const currentSku = d[15];

                f.sku.value = currentSku;
                f.image_url.value = dbImageUrl;
                f.delete_url.value = dbFileId;

                if (dbImageUrl && dbImageUrl.trim() !== "") {
                    // SCENARIO 1: Image exists in Database
                    const latestImageUrl = dbImageUrl + "?t=" + new Date().getTime();
                    document.getElementById('imgPreview').src = latestImageUrl;
                    document.getElementById('imagePreviewContainer').style.display = 'block';
                    document.getElementById('deleteBtn').style.display = 'block';
                    updateImageInputState();
                } else if (currentSku) {
                    // SCENARIO 2: Database is empty, but we have a SKU
                    console.log("Empty DB URL. Double-checking ImageKit for SKU:", currentSku);
                    
                    // This function will fetch the URL AND the fileId (metadata) 
                    // and populate the hidden form fields automatically.
                    checkExistingImage(currentSku);
                } else {
                    // SCENARIO 3: No Image and No SKU
                    document.getElementById('imagePreviewContainer').style.display = 'none';
                    document.getElementById('deleteBtn').style.display = 'none';
                    updateImageInputState();
                }

                // Also trigger the Barcode check while we are at it
                if (currentSku) {
                    google.script.run
                      .withSuccessHandler(exists => {
                        updateBarcodeStatus(exists);
                      })
                      .checkBarcodeExists(currentSku);
                }

                // Update UI Button
                document.getElementById('submitBtn').innerHTML = `Update ${itemName}`;
                document.getElementById('submitBtn').style.backgroundColor = "var(--success-green)";

                // --- LOCK CATEGORIES & VENDOR FOR UPDATE ---
                //const vSelect = document.getElementById('vendorSelect');
                const skuField = document.getElementById('skuField');
                const mainCat = document.getElementById('mainCategory');
                const subCat = document.getElementById('subCategory');

                // Apply disabled/readOnly
               /* [vSelect, mainCat, subCat].forEach(el => {
                  el.disabled = true;
                  el.style.backgroundColor = "#f0f0f0";
                });*/
                /*skuField.readOnly = false;
                skuField.style.backgroundColor = "#f0f0f0";
                skuField.style.cursor = "not-allowed";*/
                // -------------------------------------------

                
                // --- Intuitive Success Message ---
                let statusMsg = `✅ Found: ${itemName} in ${category}`;
                let statusColor = "var(--success-green)";

                // Add stock warning to the message if necessary
                if (Number(currentStock) <= Number(reorderPoint)) {
                    statusMsg = `⚠️ Found: ${itemName} (Low Stock: ${currentStock})`;
                    statusColor = "var(--vg-amber)"; // Use amber/orange for warning
                }

                document.getElementById('deleteInventoryBtn').style.display = 'block';
                showStatus(statusMsg, statusColor);

            } else {
                showStatus(`❌ No item found matching "${term}"`, "#dc3545");
                clearFormToDefault(false);
            }
        }).searchItem(term);
    }

    // Clear image warning in the file selector once item image is uploaded succesfully
    function clearImageWarning() {
      const fileInput = document.getElementById('imageFileSelector');
      // Remove the red border as soon as the user selects a file
      fileInput.style.border = "1px solid var(--border-light)";
      fileInput.style.outline = "none";
    }


    // Attach listener to SKU field
    document.getElementById('skuField').addEventListener('change', function() {
        const manualSku = this.value;
        
        if (manualSku && manualSku !== "Generating...") {
            console.log("SKU manually changed to:", manualSku);
            
            // 1. Check for Photo in ImageKit
            checkExistingImage(manualSku);
            
            // 2. Check for Barcode in Google Drive
            google.script.run
              .withSuccessHandler(exists => {
                updateBarcodeStatus(exists);
              })
              .checkBarcodeExists(manualSku);
        }
    });

    function updateBarcodeStatus(exists) {
      const statusEl = document.getElementById('barcodeStatus');
      if (!statusEl) return;

      if (exists) {
        statusEl.innerHTML = '✅'; 
        statusEl.style.display = 'inline-block';
        statusEl.style.color = 'green';
      } else {
        statusEl.innerHTML = ''; 
        statusEl.style.display = 'none';
      }
    }


    // Upload selected item image.
    async function uploadToImageKit() {
      const fileInput = document.getElementById('imageFileSelector');
      const sku = document.getElementById('skuField').value;
      const sheetName = document.getElementById('mainCategory').value;
      const btn = document.getElementById('uploadBtn');

      if (!fileInput.files || fileInput.files.length === 0 || !sku) {
          showStatus("❌ Missing File or SKU", "#dc3545");
          return;
      }

      btn.innerHTML = "Uploading...";
      const privateKey = "private_cdbgV+TsvNJm1OJ23oErePr/48o=";
      const publicKey = "public_mOLZLqdmiHFXNwD5DIWuTL6U3fA=";

      const formData = new FormData();
      formData.append("file", fileInput.files[0]);
      formData.append("fileName", sku); // Filename will be just the SKU
      formData.append("folder", "/Vidyagrama/Inventory");
      formData.append("useUniqueFileName", "false");
      formData.append("overwriteFile", "true");
      formData.append("publicKey", publicKey);

      const authHeader = "Basic " + btoa(privateKey + ":");

      try {
          const response = await fetch(`https://upload.imagekit.io/api/v1/files/upload`, {
              method: "POST",
              headers: {
                  "Authorization": authHeader,
                  "Accept": "application/json"
              },
              body: formData
          });

          const result = await response.json();

          // --- THE FIX IS HERE ---
          if (response.ok && result.url) {

            // Create a unique timestamp to bypass CDN/Browser cache
              const cacheBuster = "?t=" + new Date().getTime();
              const freshUrl = result.url + cacheBuster;

              // Update hidden inputs
              document.getElementById('image_url').value = result.url;
              document.getElementById('delete_url').value = result.fileId;
              
              // Update Preview (Thumbnail)
              const previewImg = document.getElementById('imgPreview');
              previewImg.src = freshUrl; // Use result.url directly from the object
              
              // Show the container
              document.getElementById('imagePreviewContainer').style.display = 'block';
              document.getElementById('deleteBtn').style.display = 'block';

              updateImageInputState();
              
              showStatus(`✅ Image saved for SKU: ${sku}`, "var(--success-green)");
          } else {
              throw new Error(result.message || "Upload failed");
          }
      } catch (e) {
          console.error("ImageKit Error:", e);
          showStatus("Upload Error: " + e.message, "#dc3545");
      } finally {
          btn.innerHTML = "Upload";
      }
  }

    /*Delete image from imageKit*/
    async function deleteFromImageKit() {
      const fileId = document.getElementById('delete_url').value;
      const row = document.getElementById('rowNumber').value;
      const sheet = document.getElementById('mainCategory').value;
      const btn = document.getElementById('deleteBtn');
      const privateKey = "private_cdbgV+TsvNJm1OJ23oErePr/48o=";

      if (!fileId) return showStatus("❌ No image record found.", "#dc3545");

      btn.innerHTML = "Deleting ..";
      btn.disabled = true;

      try {
        const authHeader = "Basic " + btoa(privateKey + ":");
        const response = await fetch(`https://api.imagekit.io/v1/files/${fileId}`, {
          method: "DELETE",
          headers: { "Authorization": authHeader }
        });

        if (response.status === 204 || response.ok) {
          // --- CLOUD DELETED, NOW UPDATE GOOGLE SHEET ---
          if (row && sheet) {
            google.script.run
              .withSuccessHandler(() => {
                // Clear the UI only after the sheet is updated
                resetImageUI();
                showStatus("🗑️ Image removed from Cloud & Sheet", "orange");
              })
              .clearImageInSheet(sheet, row); // Call the server-side function
          } else {
            // Fallback for new items not yet saved to a row
            resetImageUI();
            showStatus("🗑️ Image deleted. (Item not yet in sheet)", "orange");
          }
        } else {
          const error = await response.json();
          throw new Error(error.message || "Delete failed");
        }
      } catch (e) {
        console.error("Delete Error:", e);
        showStatus("Delete Error: " + e.message, "#dc3545");
      } finally {
        btn.innerHTML = "Delete Image";
        btn.disabled = false;
      }
    }

    // Helper to keep code clean
    function resetImageUI() {
      document.getElementById('imgPreview').src = "";
      document.getElementById('imagePreviewContainer').style.display = 'none';
      document.getElementById('image_url').value = "";
      document.getElementById('delete_url').value = "";
      document.getElementById('imageFileSelector').value = "";

      document.getElementById('imagePreviewContainer').style.display = 'none';
      document.getElementById('deleteBtn').style.display = 'none';

      updateImageInputState();
    }

    // helper function to update imaginput state button
    function updateImageInputState() {
      const fileInput = document.getElementById('imageFileSelector');
      const imageUrl = document.getElementById('image_url').value;
      const uploadBtn = document.getElementById('uploadBtn');

      if (imageUrl && imageUrl.trim() !== "") {
          // IMAGE EXISTS: Lock the input and the upload button
          fileInput.disabled = true;
          fileInput.style.opacity = "0.6";
          fileInput.style.cursor = "not-allowed";
          
          if(uploadBtn) uploadBtn.disabled = true;
          
          console.log("Input Locked: Image already exists.");
      } else {
          // NO IMAGE: Enable the input
          fileInput.disabled = false;
          fileInput.style.opacity = "1";
          fileInput.style.cursor = "pointer";
          
          if(uploadBtn) uploadBtn.disabled = false;
          
          console.log("Input Enabled: Ready for new upload.");
      }
  }

  async function checkExistingImage(sku) {
    if (!sku || sku === "Generating...") return;

    const folderPath = "Vidyagrama/Inventory/";
    // Use the SKU and a timestamp to avoid stale cache data
    const imageUrl = `https://ik.imagekit.io/z9zc3r7jmi/${folderPath}${sku}?t=${new Date().getTime()}`;

    const imgPreview = document.getElementById('imgPreview');
    const container = document.getElementById('imagePreviewContainer');
    const deleteBtn = document.getElementById('deleteBtn');
    const imageUrlField = document.getElementById('image_url');
    const deleteUrlField = document.getElementById('delete_url'); 

    try {
      // 1. We use HEAD to check existence without downloading the full image bytes
      const response = await fetch(imageUrl, { method: 'HEAD' });

      if (response.ok) {
        // --- IMAGE FOUND (200 OK) ---
        imgPreview.src = imageUrl;
        container.style.display = 'block';
        imageUrlField.value = imageUrl;

        // CLEAN THE URL: Save only the base path to the database
        const cleanUrl = imageUrl.split('?')[0]; 
        imageUrlField.value = cleanUrl; 
        console.log("💾 Clean URL for DB:", cleanUrl);
        

        // Now fetch the fileId from the backend securely
        google.script.run
          .withSuccessHandler(fileData => {
            if (fileData && fileData.fileId) {
              deleteUrlField.value = fileData.fileId;
              console.log("✅ Verified ImageKit ID:", fileData.fileId);

              if (deleteBtn) deleteBtn.style.display = 'block';

              updateImageInputState(); 
              showStatus("✨ Existing image found for this SKU", "var(--success-green)");
            }
            else {
                // FALSE POSITIVE: Backend found nothing, hide the ghost image
                console.warn("Ghost image detected. No metadata found for:", sku);
                resetImageUI();
              }
          })
          .getImageKitMetadata(sku);

      } else {
        // --- IMAGE NOT FOUND (404) ---
        // We don't throw an error here; we just treat it as a "No Image" state
        console.log(`ℹ️ No image found for SKU: ${sku} (Status: ${response.status})`);
        resetImageUI();
      }
    } catch (err) {
      // --- NETWORK ERROR (Offline or Blocked) ---
      console.warn("⚠️ Network error while checking image:", err.message);
      resetImageUI();
    }
  }

    // 1. TRIGGER FOR IMAGE REMOVAL
    function handleImageDeletion() {
      console.log("handleImageDeletion()"); // Check your browser console (F12) for this

      const itemName = document.getElementsByName('itemName')[0].value || "this item";
      
      document.getElementById('modalTitle').innerText = "Remove Image?";
      document.getElementById('modalBody').innerHTML = `This will unlink the photo from <b>${itemName}</b>. <br><small>Click Update afterward to save changes.</small>`;
      document.getElementById('modalIcon').innerText = "🖼️";
      document.getElementById('modalActionType').value = "IMAGE";
      
      const confirmBtn = document.getElementById('modalConfirmBtn');
      confirmBtn.innerText = "Remove";
      confirmBtn.style.background = "var(--vg-amber)"; // Warning color
      
      document.getElementById('customModal').style.display = 'flex';

    // Close the message modal
    function closeModal() {
      console.log("closeModal()"); // Check your browser console (F12) for this
      document.getElementById('customModal').style.display = 'none';
      
    }

    // Execute modal action on delete image and delte inventory item
    function executeModalAction() {
        console.log("Execute button clicked");
        const mode = document.getElementById('modalActionType').value;
        closeModal();

        if (mode === "IMAGE") {
            deleteFromImageKit(); // Added await here too for safety
            
        } else if (mode === "INVENTORY") {
            const itemName = document.getElementsByName('itemName')[0].value;
            const row = document.getElementById('rowNumber').value;
            const sheet = document.getElementById('mainCategory').value;
            const delBtn = document.getElementById('deleteInventoryBtn');
            const fileId = document.getElementById('delete_url').value;

            if (!row) return showStatus("Error: No item selected to delete", "red");

            delBtn.disabled = true;

            // --- STEP 1: Cloud Deletion ---
            if (fileId) {
                delBtn.innerHTML = "1/2 Deleting image..."; 
                deleteFromImageKit();
            }

            // --- STEP 2: Spreadsheet Deletion ---
            delBtn.innerHTML = "2/2 Deleting Record..."; 

            google.script.run
                .withSuccessHandler(res => {
                    showStatus(`🗑️ ${itemName}: ${res}`, "var(--danger-red)");
                    clearFormToDefault(true); 
                    loadRecentItems();        
                    delBtn.disabled = false;
                    delBtn.innerHTML = "Delete Item";
                })
                .withFailureHandler(err => {
                    showStatus("Error deleting: " + err, "red");
                    delBtn.disabled = false;
                    delBtn.innerHTML = "Delete Item";
                })
                .deleteItemRecord(sheet, row); 
        }
    }
    

    // Calculate Auto fields
    function calculateAutoFields() {
      const p = parseFloat(document.getElementById('pPrice').value) || 0;
      const m = parseFloat(document.getElementById('markup').value) || 0;
      const s = parseFloat(document.getElementById('stockInput').value) || 0;
      document.getElementById('sPrice').value = (p * (1 + m/100)).toFixed(2);
      document.getElementById('valOutput').value = (p * s).toFixed(2);
    }

    // Show Status messages
    function showStatus(msg, color = "#333") {
      const s = document.getElementById('status-bar');
      if (!s) return;

      s.innerHTML = msg; 
      s.style.backgroundColor = color; // Better for mobile visibility
      s.style.color = "white"; // White text on colored background is easier to read
      
      // Reset visibility and start animation
      s.classList.remove('fade-out');
      s.style.display = 'block';
      
      // After 4.5 seconds, start the fade out
      setTimeout(() => { 
        s.classList.add('fade-out'); 
      }, 4500);

      // After 5 seconds, hide it completely
      setTimeout(() => { 
        s.style.display = 'none'; 
      }, 5000); 
    }

    // Capture events for validating fields
    document.getElementById('entryForm').addEventListener('submit', function (e) {
      e.preventDefault();

      // 1. Mandatory Vendor Check
      const vendorSelect = document.getElementById('vendorSelect');
      const itemName = document.getElementsByName('itemName')[0].value;
      
      if (!vendorSelect.value) {
        showStatus("⚠️ Please select a Vendor before saving!", "#dc3545");
        vendorSelect.style.borderColor = "red";
        vendorSelect.focus();
        return; // Stop the submission
      } else {
        vendorSelect.style.borderColor = "var(--border-light)";
      }

      const subBtn = document.getElementById('submitBtn');
      const isUpdate = subBtn.innerHTML.includes("Update");
      
      subBtn.disabled = true;

      // Function to handle shared success logic for both Add and Update
      const onSuccess = () => {
        // BUG FIX 1: Refresh the inventory list so the Tick Mark (✔) appears
        loadRecentItems(currentSheet);
        
        // BUG FIX 2: Clear any lingering red warning from the image upload
        if (imageInput) {
          imageInput.style.outline = "none";
          imageInput.style.borderColor = "var(--border-light)";
        }
      };

      if (!isUpdate) {
        // FLOW FOR NEW ITEMS
        subBtn.innerHTML = `Saving Barcode for ${itemName}...`;
        const sku = document.getElementById('skuField').value;

        google.script.run
          .withSuccessHandler(() => {
            subBtn.innerHTML = `Adding ${itemName} to Inventory...`;
            // Pass itemName to the next step
            submitFormData(this, itemName);
          })
          .withFailureHandler((err) => {
            showStatus(`Failed to save barcode for ${itemName}: ` + err.message, "#dc3545");
            subBtn.disabled = false;
            subBtn.innerHTML = "Add to Inventory";
          })
          .saveBarcodeToDrive(sku, itemName);
      } else {
        // FLOW FOR UPDATES
        subBtn.innerHTML = `Updating ${itemName}...`;
        submitFormData(this, itemName);
      }
    });

    // Submit main data for ADD/ UPDATE Inventory
    function submitFormData(formElement, itemName) {
      const subBtn = document.getElementById('submitBtn');
      subBtn.disabled = true;
      subBtn.innerHTML = "Processing...";

      // Get current user role
      const session = JSON.parse(localStorage.getItem('vidyagrama_session') || '{}');
      const userRole = (session.role || "").toLowerCase();

      // Check if the role is the admin role
      const isAdmin = (userRole === 'inventory_admin');

      // 1. Manually collect values into a plain object
      // This bypasses the "disabled field" restriction entirely
      const formData = {
        rowNumber: document.getElementById('rowNumber').value,
        slNo: document.getElementById('slNo').value,
        mainCategory: document.getElementById('mainCategory').value,
        category: document.getElementById('subCategory').value,
        itemName: formElement.itemName.value,
        uom: formElement.uom.value,
        status: formElement.status.value,
        
        // SECURITY: If not admin, send "SKIP" so the backend doesn't overwrite real prices
        purchasePrice: isAdmin ? formElement.purchasePrice.value : "SKIP",
        priceMarkupPercentage: isAdmin ? formElement.priceMarkupPercentage.value : "SKIP",
        
        stock: document.getElementById('stockInput').value,
        reorderPoint: formElement.reorderPoint.value,
        moq: formElement.moq.value,
        mfgDate: formElement.mfgDate.value,
        expiryDate: formElement.expiryDate.value,
        vendorID: document.getElementById('vendorSelect').value,
        sku: document.getElementById('skuField').value,
        image_url: document.getElementById('image_url').value,
        delete_url: document.getElementById('delete_url').value
      };

      // 2. Send the clean object, not the HTML element
      google.script.run
        .withSuccessHandler((res) => {
          showStatus(`${itemName}: ${res}`, "var(--success-green)");
          clearFormToDefault(true);
          loadRecentItems();
          subBtn.disabled = false;
          subBtn.innerHTML = "Add to Inventory";
        })
        .withFailureHandler((err) => {
          showStatus(`Error processing ${itemName}: ` + err, "#dc3545");
          subBtn.disabled = false;
          subBtn.innerHTML = "Add to Inventory";
        })
        .processForm(formData); // Pass the object here
    }

    // Clear the form to default
    function clearFormToDefault(c) {
      console.log("clearFormToDefault()"); // Check your browser console (F12) for this
      const currentSheet = document.getElementById('mainCategory').value;
      document.getElementById('entryForm').reset();

      // Get current user role
      const session = JSON.parse(localStorage.getItem('vidyagrama_session') || '{}');
      const userRole = (session.role || "").toLowerCase();

      // Check if the role is the admin role
      const isAdmin = (userRole === 'inventory_admin');

      // --- UNLOCK EVERYTHING ---
      const fieldsToUnlock = [
        document.getElementById('vendorSelect'),
        document.getElementById('mainCategory'),
        document.getElementById('subCategory'),
        document.getElementById('skuField')
      ];

      fieldsToUnlock.forEach(el => {
        el.disabled = false;
        el.readOnly = false;
        el.style.backgroundColor = "white";
      });
      // -------------------------

      document.getElementById('rowNumber').value = "";
      document.getElementById('slNo').value = "";

      document.getElementById('mainCategory').value = currentSheet; // Preserve current sheet selection
      updateSubCategories(); 
      document.getElementById('submitBtn').innerHTML = "Add to Inventory";
      document.getElementById('submitBtn').style.backgroundColor = "var(--vg-brown)";
      if(c) document.getElementById('searchInput').value = "";
      document.getElementById('markup').value = "20";
      document.getElementById('imagePreviewContainer').style.display = 'none';
      document.getElementById('deleteBtn').style.display = 'none';
      document.getElementById('deleteInventoryBtn').style.display = 'none';

      const fileInput = document.getElementById('imageFileSelector');
      const uploadBtn = document.getElementById('uploadBtn');
      
      if (fileInput) {
        fileInput.style.outline = "none";
        fileInput.style.border = "1px solid var(--border-light)";
        fileInput.value = ""; // Clear the actual file selection
      }

      fileInput.disabled = false;
      fileInput.style.opacity = "1";
      fileInput.style.cursor = "pointer";
      
      if(uploadBtn) uploadBtn.disabled = false;

      resetImageUI();

      // --- FINANCIAL FIELD LOCKDOWN LOGIC ---
      const finFields = ['pPrice', 'markup', 'sPrice', 'valOutput'];
      
      finFields.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          if (isAdmin) {
            // ADMIN: Full access
            el.disabled = false; 
            el.style.backgroundColor = "white";
            el.style.cursor = "text";
          } else {
            // EDITOR: Lockdown
            el.value = (id === 'markup') ? "0" : "0.00"; // Mask data
            el.disabled = true; 
            el.style.backgroundColor = "#f0f0f0"; // Gray out
            el.style.cursor = "not-allowed";
          }
        }
      });

    }

    // load and cache vendors list for performance
    let cachedVendors = null;
    function loadVendors() {
      if (cachedVendors) {
        renderVendorSelect(cachedVendors);
        return;
      }
      
      google.script.run.withSuccessHandler(vendors => {
        cachedVendors = vendors;
        renderVendorSelect(vendors);
      }).getVendorList();
    }

    function renderVendorSelect(vendors) {
      const select = document.getElementById('vendorSelect');
      select.innerHTML = '<option value="">-- Select Vendor --</option>';
      vendors.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.id; opt.innerHTML = v.name; select.appendChild(opt);
      });
    }

    // Function to check for duplicates while typing/scanning
    function validateSkuLive() {
      const sku = document.getElementById('skuField').value;
      const currentSlNo = document.getElementById('slNo').value;
      if (!sku) return;

      google.script.run.withSuccessHandler(duplicate => {
        if (duplicate) {
          showStatus("⚠️ SKU used in " + duplicate.sheet, "#f44336");
          document.getElementById('skuField').style.borderColor = "red";
        } else {
          document.getElementById('skuField').style.borderColor = "var(--border-light)";
        }
      }).checkSkuExists(sku, currentSlNo);

    // Generate and Save Barcode
    function generateAndSaveBarcode() {
      const sku = document.getElementById('skuField').value;
      const itemName = document.getElementsByName('itemName')[0].value;
      const btn = document.getElementById('saveBarcodeBtn');

      if (!sku || !itemName) return showStatus("Need SKU and Item Name!", "#dc3545");

      btn.innerHTML = "Saving...";

        .withSuccessHandler(url => {
          showStatus("Barcode saved to Drive!", "var(--success-green)");

          showStatus(err.message, "#dc3545");

        })

    // --- SESSION & UI INITIALIZATION ---

    window.onload = function() {
      const sessionData = localStorage.getItem('vidyagrama_session');
      const loginFrame = document.getElementById('loginFrame');
      const mainApp = document.getElementById('mainApp');

      if (!sessionData) {
        if (mainApp) mainApp.style.display = 'none';
        if (loginFrame) loginFrame.style.display = 'block';
      } else {
        try {
          const userSession = JSON.parse(sessionData);
          
          // FIX: Dynamically set the name from the parsed JSON object
          const displayName = userSession.name || userSession.username || "User";
          const nameDisplay = document.getElementById('displayUserName');
          
          if (nameDisplay) {
            nameDisplay.innerText = displayName;
          }

          // EXTRA: Update Avatar initial (First letter of name)
          const avatar = document.querySelector('.avatar-circle');
          if (avatar && displayName) {
            avatar.innerText = displayName.charAt(0).toUpperCase();
          }

          if (loginFrame) loginFrame.style.display = 'none';
          if (mainApp) mainApp.style.display = 'block';

          initializeDashboard();
         
        } catch (e) {
          console.error("Session error:", e);
          localStorage.removeItem('vidyagrama_session');
          location.reload();
        }
      }
    };
      
    /**
    * Helper to show toast message during user logout
    */
    function showToast(message) {
      const toast = document.getElementById('custom-toast');
      const msgSpan = document.getElementById('toast-message');
      if (toast && msgSpan) {
        msgSpan.innerText = message;
        toast.style.display = 'block';

    /**
     * Opens the Logout Modal
     */

    function logoutUser() {
      try {
        const modalElement = document.getElementById('logoutModal');
        // Initialize and show the Bootstrap modal
        const myModal = new bootstrap.Modal(modalElement);
        myModal.show();
      } catch (err) {
        console.error("Modal Error:", err);
        if (confirm("Are you sure you want to log out?")) {
          confirmLogout(); 
        }
      }
    }

    function confirmLogout() {
      // 1. Immediately hide the modal so the UI doesn't look frozen
      const modalElem = document.getElementById('logoutModal');
      const modalInstance = bootstrap.Modal.getInstance(modalElem);
      if (modalInstance) modalInstance.hide();

      // 2. Clear the session right away 
      // (Fixes Bug #2: Ensures next person can't access Admin data)
      const storedSession = localStorage.getItem('vidyagrama_session');
      localStorage.removeItem('vidyagrama_session');

      let usernameToLog = "Guest";
      if (storedSession) {
        try {
          usernameToLog = JSON.parse(storedSession).username || "Guest";
        } catch (e) { console.error("Session parse error"); }
      }

      // 3. LOGGING: Send to Google Sheets and wait for success
      const currentCategory = document.getElementById('mainCategory').value || "General";
      
      google.script.run
        .withSuccessHandler(() => {
          // Proceed to clear UI only after server confirms log
          resetLoginForm();
        })
        .withFailureHandler(() => {
          // Fallback: Logout anyway if server fails
          resetLoginForm();
        })
        .logActivity("LOGOUT", "User performed manual sign-out", currentCategory, usernameToLog);

    }

    function resetLoginForm() {
      // 1. Reset the Login Button
      const loginBtn = document.getElementById('loginBtn'); 
      if (loginBtn) {
        loginBtn.disabled = false;
        loginBtn.innerHTML = 'Sign In'; 
      }
   
      // Clear login screen
      clearFormToDefault(true);
  
      // 3. Clear Login Fields
      const userField = document.getElementById('user');
      const passField = document.getElementById('pass');
      const statusMsg = document.getElementById('status-message');

      if (userField) userField.value = "";
      if (passField) passField.value = "";
      if (statusMsg) statusMsg.innerHTML = "";

      // 4. Switch Frames
      const mainApp = document.getElementById('mainApp');
      const loginFrame = document.getElementById('loginFrame');
      
      if (mainApp) mainApp.style.display = 'none';
      if (loginFrame) loginFrame.style.display = 'block';

      updateImageInputState();


      window.scrollTo(0,0);
    }

    /**
     * Iniitalize dashboard during login
     */
    function initializeDashboard(userSession) {
      // 1. UI Transition
      document.getElementById('mainApp').style.display = 'block';
      document.getElementById('loginFrame').style.display = 'none';

      const session = JSON.parse(localStorage.getItem('vidyagrama_session') || '{}');
      const userRole = (session.role || "").toLowerCase();

      // Check if the role is the admin role
      const isAdmin = (userRole === 'inventory_admin');

      // 2. Set the Welcome Message (FIXED)
      // Look for the ID you used in your professional header: 'displayUserName'
      const nameDisplay = document.getElementById('displayUserName');
      const avatar = document.querySelector('.avatar-circle');

      // Use the 'name' from the backend (Column 3), fallback to username if empty
      const displayName = userSession.name || userSession.username;
      
      if (nameDisplay) {
        nameDisplay.innerText = displayName;
      }

      // Update the Avatar Circle with the first letter of the real name
      if (avatar && displayName) {
        avatar.innerText = displayName.charAt(0).toUpperCase();
      }

      // 3. Set the User Role Badge
      const roleBadge = document.getElementById('userRoleBadge');
      if (roleBadge && userSession.role) {
        roleBadge.innerText = userSession.role.toUpperCase();

         // Apply the specific color class
        if (userSession.role.toLowerCase() === 'admin') {
          roleBadge.className = 'badge-pill role-admin';
        } else {
          roleBadge.className = 'badge-pill role-user';
        }
      }

       // 4.Fetch main categoreis from admin sheet
        google.script.run
            .withSuccessHandler(config => {
              // Store map globally
              window.subCategoryMap = config.categoryMap;
              const validSheets = config.validSheets;

              // 3. Populate the Main Category Dropdown
              const mainCatSelect = document.getElementById('mainCategory');
              if (mainCatSelect && validSheets) {
                mainCatSelect.innerHTML = ""; // Clear placeholder
                validSheets.forEach(sheetName => {
                  let opt = document.createElement('option');
                  opt.value = sheetName;
                  opt.textContent = sheetName;
                  mainCatSelect.appendChild(opt);
                });

                //5.  --- TRIGGER SUBCATEGORY LOAD ONLY AFTER MAIN CATS EXIST ---
                fetchSubCategoryData();

              }
        })
        .withFailureHandler(err => {
          console.error("Config load failed:", err);
        })
        .getCategoryMap(true); // Call your Apps Script function

      
      // 6. Parallel Data Fetching
      // These fire at the same time, whichever finishes first renders first.
      loadRecentItems(); 
      loadVendors();

      // --- FINANCIAL FIELD LOCKDOWN LOGIC ---
      const finFields = ['pPrice', 'markup', 'sPrice', 'valOutput'];
      
      finFields.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          if (isAdmin) {
            // ADMIN: Full access
            el.disabled = false; 
            el.style.backgroundColor = "white";
            el.style.cursor = "text";
          } else {
            // EDITOR: Lockdown
            el.value = (id === 'markup') ? "0" : "0.00"; // Mask data
            el.disabled = true; 
            el.style.backgroundColor = "#f0f0f0"; // Gray out
            el.style.cursor = "not-allowed";
          }
        }
      });
      
      // 7. Pre-focus for scanning
      document.getElementById('searchInput').focus();

      // 8 . Disable editing SKU field
      /*document.getElementById('skuField').readOnly = false;
      document.getElementById('skuField').style.backgroundColor = "#f0f0f0"; // Visual cue it's locked
      document.getElementById('skuField').style.cursor = "not-allowed";*/

    }

    // Separate this into a function to keep it clean
    function fetchSubCategoryData() {
      google.script.run
        .withSuccessHandler(function(serverMap) {
          window.subCategoryMap = serverMap;
          
          // Now that the mainCategory dropdown definitely has a value, 
          // this will correctly trigger the subcategories and the SKU generation
          updateSubCategories(); 
          
          console.log("Subcategory map and initial SKU loaded.");
        })
        .getSubCategoryMap(true);
    }
   
 /***********************************End  Login Section *************************************************************/

    function refreshSkuBuffer() {

      google.script.run.withSuccessHandler(data => {
        // Map data to a simple object for fast searching
        skuBuffer = data.map(item => ({

          name: item.name

    // 2. The Filter Logic for the Search Input
    // This function handles the "Live" filtering while typing
    function handleSearchInput(val) {
      const suggestions = document.getElementById('skuSuggestions');
      
      // Clear and hide if input is too short
      if (!val || val.length < 2) {
        suggestions.innerHTML = "";
        suggestions.style.display = "none";
        return;
      }

      // Filter the already-loaded global buffer (fullInventoryData)
      const query = val.toLowerCase();
      const matches = fullInventoryData.filter(item => 
        (item.sku && item.sku.toLowerCase().includes(query)) || 
        (item.name && item.name.toLowerCase().includes(query))
      ).slice(0, 8); // Limit to top 8 for UI cleanliness

      if (matches.length > 0) {
        suggestions.innerHTML = matches.map(item => `
          <div class="suggestion-item" onclick="selectSuggestion('${item.sku || item.slNo}')">
            <span class="s-sku">${item.sku || 'N/A'}</span>
            <span class="s-name">${item.name}</span>
          </div>
        `).join('');
        suggestions.style.display = "block";
      } else {
        suggestions.style.display = "none";
      }
    }

    // Function to handle the click on a suggestion
    function selectSuggestion(sku) {
      document.getElementById('searchInput').value = sku;
      document.getElementById('skuSuggestions').style.display = "none";
      findItem(); // Execute the actual search logic
    }

    // Close suggestions if user clicks outside
    document.addEventListener('click', function(e) {
      if (!document.querySelector('.search-box').contains(e.target)) {
        document.getElementById('skuSuggestions').style.display = "none";
      }
    });
